<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Color Catch - 糖果跳跳乐</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#1a1a2e;
    display:flex;justify-content:center;align-items:center;
    min-height:100vh;overflow:hidden;
    font-family:'Nunito','Comic Sans MS','Microsoft YaHei',sans-serif;
  }
  canvas{display:block;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
  #ui-overlay{
    position:absolute;top:0;left:0;right:0;bottom:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    pointer-events:none;
  }
  #ui-overlay.active{pointer-events:all}
  .panel{
    background:rgba(255,255,255,0.92);
    border-radius:24px;padding:32px 48px;text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    border:3px solid rgba(255,255,255,0.5);
    display:none;
  }
  .panel.visible{display:block}
  .panel h1{
    font-size:2.4em;margin-bottom:8px;
    background:linear-gradient(135deg,#FF6B6B,#FFD93D,#95E66A,#4ECDC4,#C77DFF,#FF9F43);
    background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    animation:gradientShift 3s ease infinite;
  }
  @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  .panel h2{font-size:1.6em;color:#555;margin-bottom:16px}
  .panel p{font-size:1.1em;color:#777;margin-bottom:20px}
  .score-display{font-size:3em;font-weight:800;color:#FF9F43;text-shadow:2px 2px 0 #fff}
  .btn{
    display:inline-block;padding:14px 40px;font-size:1.2em;font-weight:700;
    border:none;border-radius:50px;cursor:pointer;margin:8px;
    transition:transform 0.15s,box-shadow 0.15s;
    font-family:inherit;
  }
  .btn:hover{transform:scale(1.08);box-shadow:0 4px 20px rgba(0,0,0,0.15)}
  .btn-primary{background:linear-gradient(135deg,#FF6B6B,#FF9F43);color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,0.2)}
  .btn-secondary{background:linear-gradient(135deg,#4ECDC4,#95E66A);color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,0.2)}
  .combo-text{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:2.5em;font-weight:900;color:#FFD700;
    text-shadow:3px 3px 0 rgba(0,0,0,0.3),-1px -1px 0 #fff;
    pointer-events:none;opacity:0;
    transition:none;
  }
  .combo-text.pop{
    animation:comboPop 0.8s ease-out forwards;
  }
  @keyframes comboPop{
    0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}
    30%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
    60%{opacity:1;transform:translate(-50%,-60%) scale(1.0)}
    100%{opacity:0;transform:translate(-50%,-80%) scale(0.8)}
  }
  .instructions{
    font-size:0.9em;color:#999;margin-top:16px;line-height:1.6;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui-overlay" class="active">
  <div id="start-panel" class="panel visible">
    <h1>Color Catch</h1>
    <h2>糖果跳跳乐</h2>
    <p>控制小糖豆跳上相同颜色的糖果！<br>错过颜色=游戏结束</p>
    <button class="btn btn-primary" onclick="startGame()">开始游戏</button>
    <div class="instructions">← → 移动 &nbsp;|&nbsp; 匹配颜色得分</div>
  </div>
  <div id="over-panel" class="panel">
    <h2>游戏结束</h2>
    <div class="score-display" id="final-score">0</div>
    <p>最终得分</p>
    <button class="btn btn-secondary" onclick="startGame()">再来一次</button>
  </div>
  <div id="combo-el" class="combo-text"></div>
</div>
<script>
"use strict";

// ─────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width = Math.min(400, innerWidth - 20);
const H = canvas.height = Math.min(640, innerHeight - 20);

// ─────────────────────────────────────────
// CANDY COLOR PALETTE (开心消消乐风格)
// ─────────────────────────────────────────
const COLORS = {
  red:    '#FF6B6B',  // 珊瑚红
  yellow: '#FFD93D',  // 明黄
  blue:   '#4ECDC4',  // 薄荷蓝
  green:  '#95E66A',  // 荧光绿
  purple: '#C77DFF',  // 葡萄紫
  orange: '#FF9F43',  // 橙子橙
};
const COLOR_KEYS = Object.keys(COLORS);
const COLOR_NAMES = ['red','yellow','blue','green','purple','orange'];

// ─────────────────────────────────────────
// EASING FUNCTIONS (Q弹弹簧曲线)
// ─────────────────────────────────────────
const ease = {
  outBack: t => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  outElastic: t => {
    if (t === 0 || t === 1) return t;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
  },
  outBounce: t => {
    const n1 = 7.5625, d1 = 2.75;
    if (t < 1 / d1) return n1 * t * t;
    else if (t < 2 / d1) return n1 * (t -= 1.5 / d1) * t + 0.75;
    else if (t < 2.5 / d1) return n1 * (t -= 2.25 / d1) * t + 0.9375;
    else return n1 * (t -= 2.625 / d1) * t + 0.984375;
  },
  outQuad: t => 1 - (1 - t) * (1 - t),
  inOutSine: t => -(Math.cos(Math.PI * t) - 1) / 2,
};

// ─────────────────────────────────────────
// PARTICLE SYSTEM
// ─────────────────────────────────────────
class Particle {
  constructor(x, y, color, type = 'jump') {
    this.x = x; this.y = y;
    this.color = color;
    this.type = type;
    this.alive = true;
    this.life = 1.0;
    this.decay = 0.03 + Math.random() * 0.02;
    
    if (type === 'jump') {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 2.5;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 2;
      this.r = 3 + Math.random() * 3;
      this.decay = 0.04;
    } else if (type === 'score') {
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
      const speed = 3 + Math.random() * 3;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.r = 2 + Math.random() * 4;
      this.decay = 0.025;
      this.star = Math.random() > 0.5;
    } else if (type === 'eliminate') {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 1;
      this.r = 4 + Math.random() * 6;
      this.decay = 0.02;
    } else if (type === 'trail') {
      this.vx = (Math.random() - 0.5) * 0.5;
      this.vy = -0.5 - Math.random() * 0.5;
      this.r = 2 + Math.random() * 2;
      this.decay = 0.08;
    }
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.08; // gravity
    this.vx *= 0.98;
    this.life -= this.decay;
    if (this.life <= 0) this.alive = false;
  }
  draw(ctx) {
    const alpha = Math.max(0, this.life);
    ctx.save();
    ctx.globalAlpha = alpha;
    if (this.type === 'score' && this.star) {
      // Draw star
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 6;
      drawStar(ctx, this.x, this.y, 5, this.r, this.r * 0.5);
    } else {
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  let rot = Math.PI / 2 * 3;
  const step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.closePath();
  ctx.fill();
}

class ParticlePool {
  constructor() { this.particles = []; }
  emit(x, y, color, type, count = 8) {
    for (let i = 0; i < count; i++) {
      this.particles.push(new Particle(x, y, color, type));
    }
  }
  update() {
    this.particles = this.particles.filter(p => {
      p.update();
      return p.alive;
    });
  }
  draw(ctx) {
    this.particles.forEach(p => p.draw(ctx));
  }
}

// ─────────────────────────────────────────
// SCORE POPUP
// ─────────────────────────────────────────
class ScorePopup {
  constructor(x, y, text, color = '#FFD700') {
    this.x = x; this.y = y;
    this.text = text;
    this.color = color;
    this.life = 1.0;
    this.vy = -2.5;
    this.scale = 0.5;
    this.alive = true;
  }
  update() {
    this.y += this.vy;
    this.vy *= 0.95;
    this.life -= 0.025;
    if (this.life < 0.5) this.scale = ease.outBack(1 - this.life * 2) * 0.8 + 0.5;
    else this.scale = ease.outBack((this.life - 0.5) * 2) * 0.5 + 0.5;
    if (this.life <= 0) this.alive = false;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, this.life * 2);
    ctx.font = `bold ${Math.round(18 * this.scale)}px Nunito, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText(this.text, this.x + 1, this.y + 1);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

// ─────────────────────────────────────────
// SCREEN SHAKE
// ─────────────────────────────────────────
let shake = { x: 0, y: 0, intensity: 0, decay: 0.9 };
function triggerShake(intensity) {
  shake.intensity = Math.max(shake.intensity, intensity);
}
function updateShake() {
  if (shake.intensity > 0.1) {
    shake.x = (Math.random() - 0.5) * shake.intensity * 2;
    shake.y = (Math.random() - 0.5) * shake.intensity * 2;
    shake.intensity *= shake.decay;
  } else {
    shake.x = 0; shake.y = 0; shake.intensity = 0;
  }
}

// ─────────────────────────────────────────
// SCROLLING BACKGROUND (视差)
// ─────────────────────────────────────────
const BG_LAYERS = [
  { speed: 0.2, offset: 0, clouds: [] },   // 远景云
  { speed: 0.5, offset: 0, hills: [] },     // 中景山丘
  { speed: 1.0, offset: 0, grass: [] },    // 近景草地
];

function initBackground() {
  // 初始化云朵
  BG_LAYERS[0].clouds = [];
  for (let i = 0; i < 5; i++) {
    BG_LAYERS[0].clouds.push({
      x: Math.random() * W * 1.5,
      y: 30 + Math.random() * 80,
      w: 60 + Math.random() * 80,
      h: 25 + Math.random() * 20,
    });
  }
  // 初始化山丘
  BG_LAYERS[1].hills = [];
  for (let i = 0; i < 6; i++) {
    BG_LAYERS[1].hills.push({
      x: i * (W / 3) - 50,
      h: 60 + Math.random() * 80,
      w: W / 2.5 + Math.random() * 50,
    });
  }
  // 初始化草地装饰
  BG_LAYERS[2].grass = [];
  for (let i = 0; i < 20; i++) {
    BG_LAYERS[2].grass.push({
      x: i * (W / 10) + Math.random() * 20,
      h: 8 + Math.random() * 12,
      sway: Math.random() * Math.PI * 2,
    });
  }
}

function updateBackground(playerVY) {
  const scrollSpeed = Math.max(0, -playerVY) * 0.3;
  BG_LAYERS.forEach(layer => {
    layer.offset = (layer.offset + scrollSpeed * layer.speed) % (W * 2);
  });
  // 草摇摆
  BG_LAYERS[2].grass.forEach(g => { g.sway += 0.05; });
}

function drawBackground() {
  // 天空渐变
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#87CEEB');
  sky.addColorStop(0.5, '#B8E4F9');
  sky.addColorStop(1, '#FFE4E1');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // 远景云
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  BG_LAYERS[0].clouds.forEach(c => {
    const cx = ((c.x - BG_LAYERS[0].offset * 0.5) % (W * 1.5 + c.w)) - c.w;
    drawCloud(ctx, cx, c.y, c.w, c.h);
  });

  // 中景山丘
  BG_LAYERS[1].hills.forEach(h => {
    const hx = ((h.x - BG_LAYERS[1].offset * 0.5) % (W + h.w * 2)) - h.w;
    ctx.fillStyle = '#90C695';
    ctx.beginPath();
    ctx.ellipse(hx + h.w / 2, H - 60, h.w / 2, h.h, 0, Math.PI, 0);
    ctx.fill();
  });

  // 近景草地
  BG_LAYERS[2].grass.forEach(g => {
    const gx = ((g.x - BG_LAYERS[2].offset) % (W + 30)) - 15;
    const sway = Math.sin(g.sway) * 3;
    ctx.strokeStyle = '#6BBF59';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(gx, H);
    ctx.quadraticCurveTo(gx + sway, H - g.h / 2, gx + sway * 1.5, H - g.h);
    ctx.stroke();
  });

  // 地面
  const ground = ctx.createLinearGradient(0, H - 60, 0, H);
  ground.addColorStop(0, '#7EC850');
  ground.addColorStop(1, '#5A9E3A');
  ctx.fillStyle = ground;
  roundRect(ctx, 0, H - 60, W, 60, 0);
  ctx.fill();
}

function drawCloud(ctx, x, y, w, h) {
  ctx.beginPath();
  ctx.ellipse(x, y, w * 0.5, h * 0.6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x - w * 0.3, y + h * 0.1, w * 0.35, h * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + w * 0.3, y + h * 0.05, w * 0.3, h * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();
}

// ─────────────────────────────────────────
// PLATFORM TYPES
// ─────────────────────────────────────────
const PLAT_TYPES = ['normal', 'crumbling', 'moving', 'bonus'];

class Platform {
  constructor(x, y, w, colorKey, type = 'normal') {
    this.x = x; this.y = y; this.w = w; this.h = 18;
    this.colorKey = colorKey;
    this.color = COLORS[colorKey];
    this.type = type;
    this.alive = true;
    this.animScale = 1.0;
    this.animTime = 0;
    // 特殊属性
    this.moveDir = type === 'moving' ? (Math.random() > 0.5 ? 1 : -1) : 0;
    this.moveSpeed = type === 'moving' ? 1.2 : 0;
    this.crumbleTimer = 0;
    this.crumbling = false;
    this.alpha = 1.0;
    // Q弹动画
    this.springX = 0; this.springVX = 0;
    this.springY = 0; this.springVY = 0;
    // 入场动画
    this.enterTime = 0; this.entered = false;
  }

  land() {
    if (this.type === 'crumbling' && !this.crumbling) {
      this.crumbling = true;
      this.crumbleTimer = 0;
    }
    // Q弹压缩动画
    this.springVY = -6;
    this.springVX = 0;
  }

  update(dt, scrollY) {
    // 入场动画
    if (!this.entered) {
      this.enterTime += dt;
      if (this.enterTime < 0.4) {
        this.animScale = ease.outBack(this.enterTime / 0.4) * 0.3 + 0.7;
      } else {
        this.animScale = 1.0;
        this.entered = true;
      }
    }
    // 移动平台
    if (this.type === 'moving') {
      this.x += this.moveDir * this.moveSpeed;
      if (this.x <= 10 || this.x + this.w >= W - 10) this.moveDir *= -1;
    }
    // 崩塌平台
    if (this.crumbling) {
      this.crumbleTimer += dt;
      this.alpha = Math.max(0, 1 - this.crumbleTimer / 0.6);
      if (this.crumbleTimer > 0.6) this.alive = false;
    }
    // 弹簧物理
    this.springY += this.springVY;
    this.springVY += 0.5;
    if (this.springY > 0) { this.springY = 0; this.springVY = 0; }
    this.springX += this.springVX;
    this.springVX *= 0.85;
  }

  draw(ctx) {
    if (!this.alive) return;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2 + this.springY;
    const ew = this.w * this.animScale;
    const eh = this.h * this.animScale;
    const r = eh / 2 + 2;

    // 平台主体
    const grad = ctx.createLinearGradient(cx - ew / 2, cy - eh / 2, cx - ew / 2, cy + eh / 2);
    if (this.type === 'bonus') {
      grad.addColorStop(0, '#FFD700');
      grad.addColorStop(1, '#FF9F43');
    } else if (this.type === 'crumbling') {
      grad.addColorStop(0, this.color + 'CC');
      grad.addColorStop(1, this.color + '88');
    } else {
      grad.addColorStop(0, this.color);
      grad.addColorStop(1, shadeColor(this.color, -30));
    }
    ctx.fillStyle = grad;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    roundRect(ctx, cx - ew / 2, cy - eh / 2, ew, eh, r);
    ctx.fill();

    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    roundRect(ctx, cx - ew / 2 + 4, cy - eh / 2 + 2, ew - 8, eh * 0.35, r * 0.5);
    ctx.fill();

    // 特殊标记
    if (this.type === 'crumbling' && this.crumbling) {
      // 裂缝效果
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(cx - ew / 3 + i * ew / 4, cy - eh / 2);
        ctx.lineTo(cx - ew / 4 + i * ew / 4, cy + eh / 2);
        ctx.stroke();
      }
    }
    if (this.type === 'bonus') {
      // 金币标记
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.round(eh * 0.7)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.shadowBlur = 0;
      ctx.fillText('★', cx, cy + eh * 0.25);
    }

    ctx.restore();
  }
}

// ─────────────────────────────────────────
// PLAYER (小糖豆)
// ─────────────────────────────────────────
class Player {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.r = 18;
    this.vx = 0; this.vy = 0;
    this.colorKey = COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)];
    this.color = COLORS[this.colorKey];
    this.onGround = false;
    this.alive = true;
    this.animTime = 0;
    // Q弹状态
    this.scaleX = 1; this.scaleY = 1;
    this.targetScaleX = 1; this.targetScaleY = 1;
    this.blinkTimer = 0;
    this.isBlinking = false;
    // 拉伸状态
    this.stretchY = 1;
    this.floatPhase = 0;
  }

  jump() {
    this.vy = -11;
    this.targetScaleX = 0.75;
    this.targetScaleY = 1.3;
    // 跳跃粒子
    particles.emit(this.x, this.y + this.r, this.color, 'jump', 10);
  }

  land() {
    this.targetScaleX = 1.25;
    this.targetScaleY = 0.7;
    // 落地压缩
    setTimeout(() => {
      this.targetScaleX = 1;
      this.targetScaleY = 1;
    }, 80);
  }

  update(dt) {
    this.animTime += dt;
    this.floatPhase += 0.06;
    // 眨眼
    this.blinkTimer += dt;
    if (this.blinkTimer > 3 + Math.random() * 2) {
      this.isBlinking = true;
      setTimeout(() => { this.isBlinking = false; }, 120);
      this.blinkTimer = 0;
    }
    // Q弹缩放插值
    this.scaleX += (this.targetScaleX - this.scaleX) * 0.25;
    this.scaleY += (this.targetScaleY - this.scaleY) * 0.25;
    // 跳跃时拉伸
    if (this.vy < -2) {
      this.stretchY = 1 + Math.min(0.3, Math.abs(this.vy) * 0.04);
    } else if (this.vy > 2) {
      this.stretchY = 1 - Math.min(0.2, Math.abs(this.vy) * 0.03);
    } else {
      this.stretchY += (1 - this.stretchY) * 0.15;
    }
    // 物理
    this.vy += 0.38; // 重力
    this.y += this.vy;
    this.x += this.vx;
    this.vx *= 0.88;
    // 边界
    if (this.x < this.r) { this.x = this.r; this.vx *= -0.5; }
    if (this.x > W - this.r) { this.x = W - this.r; this.vx *= -0.5; }
    // 拖尾粒子
    if (Math.abs(this.vx) > 1 || Math.abs(this.vy) > 2) {
      if (Math.random() > 0.6) {
        particles.emit(this.x, this.y, this.color, 'trail', 1);
      }
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    const sx = this.scaleX * (1 / this.stretchY);
    const sy = this.scaleY * this.stretchY;
    // 待机浮动
    const float = Math.sin(this.floatPhase) * 2;
    ctx.translate(0, float);
    ctx.scale(sx, sy);
    const r = this.r;

    // 身体主体（圆形带高光）
    const bodyGrad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, 0, 0, r);
    bodyGrad.addColorStop(0, lightenColor(this.color, 60));
    bodyGrad.addColorStop(0.4, lightenColor(this.color, 20));
    bodyGrad.addColorStop(1, shadeColor(this.color, -20));
    ctx.fillStyle = bodyGrad;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    // 高光圆
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.ellipse(-r * 0.35, -r * 0.38, r * 0.32, r * 0.22, -0.5, 0, Math.PI * 2);
    ctx.fill();

    // 腮红
    ctx.fillStyle = 'rgba(255,150,150,0.35)';
    ctx.beginPath();
    ctx.ellipse(-r * 0.55, r * 0.15, r * 0.18, r * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(r * 0.55, r * 0.15, r * 0.18, r * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();

    // 眼睛
    const eyeY = -r * 0.1;
    const eyeR = r * 0.18;
    if (this.isBlinking) {
      // 眨眼（横线）
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-eyeR * 2, eyeY);
      ctx.lineTo(-eyeR * 0.5, eyeY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(eyeR * 0.5, eyeY);
      ctx.lineTo(eyeR * 2, eyeY);
      ctx.stroke();
    } else {
      // 大眼睛
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(-r * 0.3, eyeY, eyeR, eyeR * 1.15, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(r * 0.3, eyeY, eyeR, eyeR * 1.15, 0, 0, Math.PI * 2);
      ctx.fill();
      // 瞳孔
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(-r * 0.3, eyeY + eyeR * 0.1, eyeR * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(r * 0.3, eyeY + eyeR * 0.1, eyeR * 0.55, 0, Math.PI * 2);
      ctx.fill();
      // 眼神光
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-r * 0.2, eyeY - eyeR * 0.1, eyeR * 0.22, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(r * 0.4, eyeY - eyeR * 0.1, eyeR * 0.22, 0, Math.PI * 2);
      ctx.fill();
    }

    // 小嘴巴
    ctx.fillStyle = shadeColor(this.color, -40);
    ctx.beginPath();
    ctx.ellipse(0, r * 0.35, r * 0.18, r * 0.1, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

// ─────────────────────────────────────────
// COLOR BALL (目标糖果球)
// ─────────────────────────────────────────
class ColorBall {
  constructor(x, y, colorKey) {
    this.x = x; this.y = y;
    this.colorKey = colorKey;
    this.color = COLORS[colorKey];
    this.r = 14;
    this.alive = true;
    this.animTime = 0;
    this.floatPhase = Math.random() * Math.PI * 2;
    this.entered = false;
    this.enterTime = 0;
    this.scale = 0;
    this.bonus = colorKey === 'orange'; // orange=bonus
  }

  update(dt) {
    this.animTime += dt;
    this.floatPhase += 0.05;
    if (!this.entered) {
      this.enterTime += dt;
      this.scale = ease.outBack(Math.min(1, this.enterTime / 0.35));
      if (this.enterTime > 0.35) { this.scale = 1; this.entered = true; }
    }
  }

  draw(ctx) {
    if (!this.alive) return;
    ctx.save();
    const floatY = Math.sin(this.floatPhase) * 4;
    ctx.translate(this.x, this.y + floatY);
    ctx.scale(this.scale, this.scale);
    const r = this.r;

    // 发光
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 15;
    const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, 0, 0, r);
    grad.addColorStop(0, lightenColor(this.color, 70));
    grad.addColorStop(0.5, lightenColor(this.color, 20));
    grad.addColorStop(1, this.color);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.ellipse(-r * 0.3, -r * 0.35, r * 0.35, r * 0.22, -0.4, 0, Math.PI * 2);
    ctx.fill();

    // Bonus星号
    if (this.bonus) {
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 8;
      ctx.font = `bold ${r}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', 0, 1);
    }

    ctx.restore();
  }
}

// ─────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────
let game = {};
let particles;
let scorePopups;
let highestY;
let scrollY = 0;
let platforms = [];
let colorBalls = [];
let keys = {};
let lastTime = 0;

function initGame() {
  particles = new ParticlePool();
  scorePopups = [];
  platforms = [];
  colorBalls = [];
  scrollY = 0;
  shake = { x: 0, y: 0, intensity: 0, decay: 0.9 };
  initBackground();

  game = {
    score: 0,
    combo: 0,
    comboTimer: 0,
    maxCombo: 0,
    level: 1,
    levelTimer: 0,
    gameOver: false,
    gameOverAnim: 0,
    started: false,
    cameraY: 0,
    cameraTargetY: 0,
  };

  // 初始平台
  const groundPlat = new Platform(W / 2 - 50, H - 80, 100, COLOR_NAMES[0], 'normal');
  groundPlat.entered = true; groundPlat.animScale = 1;
  platforms.push(groundPlat);

  // 玩家
  game.player = new Player(W / 2, H - 80 - 20);
  highestY = game.player.y;

  // 生成初始平台
  for (let i = 0; i < 8; i++) {
    spawnRow(H - 80 - (i + 1) * 85, i);
  }
}

function spawnRow(y, rowIndex) {
  const spacing = W / 4;
  for (let i = 0; i < 3; i++) {
    const x = spacing * i + 20 + Math.random() * (spacing - 40);
    const colorKey = COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)];
    const r = Math.random();
    let type = 'normal';
    if (rowIndex > 2) {
      if (r < 0.08) type = 'bonus';
      else if (r < 0.2) type = 'crumbling';
      else if (r < 0.3) type = 'moving';
    }
    platforms.push(new Platform(x, y, 70 + Math.random() * 20, colorKey, type));
    // 颜色球（50%概率）
    if (Math.random() > 0.5) {
      const ballX = spacing * (i + 0.5) + Math.random() * 30 - 15;
      const ballColorKey = COLOR_NAMES[Math.floor(Math.random() * COLOR_NAMES.length)];
      colorBalls.push(new ColorBall(ballX, y - 30 - Math.random() * 20, ballColorKey));
    }
  }
}

function startGame() {
  document.getElementById('ui-overlay').classList.add('active');
  document.getElementById('start-panel').classList.remove('visible');
  document.getElementById('over-panel').classList.remove('visible');
  initGame();
  game.started = true;
  requestAnimationFrame(gameLoop);
}

function showGameOver() {
  document.getElementById('final-score').textContent = game.score;
  document.getElementById('ui-overlay').classList.add('active');
  document.getElementById('over-panel').classList.add('visible');
}

function showCombo(count) {
  if (count < 2) return;
  const el = document.getElementById('combo-el');
  el.textContent = `${count}x COMBO!`;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  triggerShake(count >= 5 ? 4 : 2);
  if (count >= 5) {
    particles.emit(W / 2, H / 2, '#FFD700', 'eliminate', 20);
  }
}

// ─────────────────────────────────────────
// COLLISION DETECTION (修复穿模)
// ─────────────────────────────────────────
function checkPlatformCollision(player, platform) {
  if (!platform.alive) return false;
  // 只在下落时检测
  if (player.vy < 0) return false;
  const px = player.x;
  const py = player.y;
  const pr = player.r;
  const platTop = platform.y + platform.h / 2 + platform.springY;
  const platLeft = platform.x;
  const platRight = platform.x + platform.w;
  const prevPY = py - player.vy;
  // 穿模修正：确保从上方接触
  if (px > platLeft - pr * 0.5 && px < platRight + pr * 0.5) {
    if (prevPY <= platTop + 2 && py >= platTop - 2) {
      return true;
    }
  }
  return false;
}

function checkBallCollision(player, ball) {
  if (!ball.alive) return false;
  const dx = player.x - ball.x;
  const dy = player.y - ball.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < player.r + ball.r;
}

// ─────────────────────────────────────────
// UPDATE
// ─────────────────────────────────────────
function update(dt) {
  if (game.gameOver) {
    game.gameOverAnim += dt;
    return;
  }

  const p = game.player;
  p.update(dt);

  // Combo计时
  if (game.comboTimer > 0) {
    game.comboTimer -= dt;
    if (game.comboTimer <= 0) {
      game.combo = 0;
    }
  }

  // Level升级
  game.levelTimer += dt;
  if (game.levelTimer > 15) {
    game.levelTimer = 0;
    game.level = Math.min(10, game.level + 1);
  }

  // 输入
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) p.vx -= 0.6;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) p.vx += 0.6;

  // 平台更新
  platforms.forEach(pl => pl.update(dt, scrollY));
  platforms = platforms.filter(pl => pl.alive);

  // 颜色球更新
  colorBalls.forEach(ball => ball.update(dt));
  colorBalls = colorBalls.filter(ball => ball.alive);

  // 平台碰撞
  let landed = false;
  for (const pl of platforms) {
    if (checkPlatformCollision(p, pl)) {
      p.y = pl.y + pl.h / 2 + pl.springY - p.r;
      if (p.vy > 2) p.land();
      p.vy = 0;
      p.onGround = true;
      landed = true;
      pl.land();
      // 颜色匹配
      if (pl.colorKey === p.colorKey) {
        // 匹配成功
        const comboMultiplier = Math.max(1, game.combo);
        const baseScore = pl.type === 'bonus' ? 30 : 10;
        const pts = baseScore * comboMultiplier;
        game.score += pts;
        game.combo++;
        game.comboTimer = 2.0;
        game.maxCombo = Math.max(game.maxCombo, game.combo);
        if (game.combo >= 2) showCombo(game.combo);
        particles.emit(p.x, p.y, pl.color, 'score', 12);
        scorePopups.push(new ScorePopup(p.x, p.y - 20, `+${pts}`, '#FFD700'));
        // 换色
        changePlayerColor();
        // 消除粒子（如果是大Combo）
        if (game.combo >= 3) {
          particles.emit(p.x, p.y, pl.color, 'eliminate', 8);
        }
      } else {
        // 颜色不匹配，游戏结束
        game.combo = 0;
        particles.emit(p.x, p.y, '#FF0000', 'eliminate', 15);
        triggerShake(6);
        scorePopups.push(new ScorePopup(p.x, p.y - 20, '颜色不匹配!', '#FF4444'));
      }
      break;
    }
  }
  if (!landed) p.onGround = false;

  // 颜色球碰撞（额外得分/换色）
  for (const ball of colorBalls) {
    if (checkBallCollision(p, ball)) {
      const pts = ball.bonus ? 50 : 15;
      game.score += pts;
      particles.emit(ball.x, ball.y, ball.color, 'score', 15);
      if (ball.bonus) {
        particles.emit(ball.x, ball.y, '#FFD700', 'eliminate', 20);
        triggerShake(3);
      }
      scorePopups.push(new ScorePopup(ball.x, ball.y, `+${pts}`, '#FFD700'));
      ball.alive = false;
    }
  }

  // 相机跟随
  const targetCameraY = Math.min(0, -(p.y - H * 0.6));
  game.cameraTargetY += (targetCameraY - game.cameraTargetY) * 0.1;
  scrollY = game.cameraTargetY;

  // 背景视差
  updateBackground(p.vy);

  // 粒子
  particles.update();
  scorePopups = scorePopups.filter(s => { s.update(); return s.alive; });
  updateShake();

  // 生成新行
  const topY = Math.min(...platforms.map(pl => pl.y));
  if (topY > -scrollY - 100) {
    spawnRow(topY - 85, 99);
  }

  // 屏幕外清理
  platforms = platforms.filter(pl => pl.y < -scrollY + H + 100);
  colorBalls = colorBalls.filter(b => b.y < -scrollY + H + 100);

  // 死亡检测（掉出屏幕底部）
  if (p.y > -scrollY + H + 50) {
    game.gameOver = true;
    setTimeout(showGameOver, 600);
  }

  // 最高分追踪（用于屏幕外死亡）
  highestY = Math.min(highestY, p.y);
}

function changePlayerColor() {
  const idx = COLOR_NAMES.indexOf(game.player.colorKey);
  let newIdx;
  do { newIdx = Math.floor(Math.random() * COLOR_NAMES.length); }
  while (newIdx === idx);
  game.player.colorKey = COLOR_NAMES[newIdx];
  game.player.color = COLORS[game.player.colorKey];
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render() {
  ctx.save();
  ctx.translate(shake.x, shake.y);

  // 背景
  drawBackground();

  // 相机变换
  ctx.save();
  ctx.translate(0, scrollY);

  // 平台
  platforms.forEach(pl => pl.draw(ctx));

  // 颜色球
  colorBalls.forEach(ball => ball.draw(ctx));

  // 玩家
  if (!game.gameOver || game.gameOverAnim < 0.5) {
    const alpha = game.gameOver ? Math.max(0, 1 - game.gameOverAnim * 2) : 1;
    ctx.globalAlpha = alpha;
    game.player.draw(ctx);
    ctx.globalAlpha = 1;
  }

  // 粒子
  particles.draw(ctx);

  // 得分弹出
  scorePopups.forEach(s => s.draw(ctx));

  ctx.restore(); // camera

  // HUD（固定在屏幕）
  drawHUD(ctx);

  ctx.restore(); // shake
}

function drawHUD(ctx) {
  // 分数卡
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = 12;
  roundRect(ctx, W / 2 - 80, 12, 160, 50, 16);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#FFD93D';
  ctx.font = 'bold 11px Nunito,sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('SCORE', W / 2, 30);
  ctx.fillStyle = '#FF9F43';
  ctx.font = 'bold 22px Nunoto,sans-serif';
  ctx.fillText(game.score, W / 2, 52);
  ctx.restore();

  // Combo
  if (game.combo >= 2) {
    ctx.save();
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${16 + game.combo * 2}px Nunito,sans-serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = '#FF9F43';
    ctx.shadowBlur = 8;
    ctx.fillText(`${game.combo}x`, W / 2, 78);
    ctx.restore();
  }

  // 最高Combo
  if (game.maxCombo >= 2) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '11px Nunito,sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(`最佳 ${game.maxCombo}x`, W - 12, 26);
    ctx.restore();
  }

  // 玩家当前颜色指示
  ctx.save();
  ctx.fillStyle = COLORS[game.player.colorKey];
  ctx.shadowColor = COLORS[game.player.colorKey];
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(W - 28, 30, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.ellipse(W - 31, 27, 4, 3, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 关卡
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '10px Nunito,sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`LV.${game.level}`, 12, 26);
  ctx.restore();
}

// ─────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────
function gameLoop(ts) {
  const dt = Math.min(0.05, (ts - lastTime) / 1000);
  lastTime = ts;
  update(dt);
  render();
  if (!game.gameOver) {
    requestAnimationFrame(gameLoop);
  } else {
    // 游戏结束画面继续渲染一会儿
    if (game.gameOverAnim < 1.0) {
      requestAnimationFrame(gameLoop);
    }
  }
}

// ─────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// 触摸支持
let touchStartX = null;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (touchStartX !== null && game.started && !game.gameOver) {
    const dx = e.touches[0].clientX - touchStartX;
    game.player.vx += dx * 0.015;
    touchStartX = e.touches[0].clientX;
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => { touchStartX = null; });

// 点击跳跃
canvas.addEventListener('click', () => {
  if (game.started && !game.gameOver && game.player.onGround) {
    // 自动跳跃（屏幕点击时）
  }
});

// ─────────────────────────────────────────
// UTILITY
// ─────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  if (w < 2 * r) r = w / 2;
  if (h < 2 * r) r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function shadeColor(color, pct) {
  const num = parseInt(color.replace('#', ''), 16);
  const amt = Math.round(2.55 * pct);
  const R = Math.max(0, Math.min(255, (num >> 16) + amt));
  const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
  const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
  return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
}

function lightenColor(color, pct) {
  return shadeColor(color, pct);
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
// 预加载背景
initBackground();
</script>
