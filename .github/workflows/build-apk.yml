name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync to Android
        run: npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          # Clean any corrupted Gradle cache
          rm -rf ~/.gradle/caches/jars-9/18366b31678c0171857be093a3b8ec22
          # Build with full debug output
          ./gradlew assembleDebug -PversionCode=${{ github.run_number }} --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-output.txt
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK_BUILD_SUCCESS"
          else
            echo "APK_BUILD_FAILED"
            tail -50 /tmp/gradle-output.txt
            exit 1
          fi

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ColorCatch-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
