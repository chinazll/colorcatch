name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync to Android
        run: npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build APK
        run: |
          # Patch bcprov JAR: remove Java 21 entries to fix Gradle 8.2 ASM incompatibility
          BCProv_PATH=$(find ~/.gradle/caches/modules-2/files-2.1/org.bouncycastle/bcprov-jdk18on/1.79 -name "*.jar" 2>/dev/null | head -1)
          if [ -f "$BCProv_PATH" ]; then
            echo "Patching bcprov JAR: $BCProv_PATH"
            cd $(dirname "$BCProv_PATH")
            cp "$BCProv_PATH" bcprov-backup.jar
            mkdir -p /tmp/bcprov-patch && cd /tmp/bcprov-patch
            unzip -q bcprov-backup.jar
            find . -name "*.class" -path "*/21/*" -delete
            rm -f bcprov-backup.jar
            zip -qr -9 ../bcprov-fixed.jar .
            cp bcprov-fixed.jar "$BCProv_PATH"
            echo "bcprov patched successfully"
          else
            echo "bcprov JAR not found, skipping patch"
          fi
          # Build APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -PversionCode=${{ github.run_number }} --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ColorCatch-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
