// Force all bouncycastle to 1.72 — bcprov-jdk18on 1.79 contains META-INF/versions/21/ 
// multi-release JAR entries that Gradle 8.2's instrumentation cannot process.
// Applied to ALL projects including nested buildscripts.
allprojects {
    configurations.configureEach {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'org.bouncycastle') {
                def name = details.requested.name
                // Replace jdk15on with jdk18on
                if (name.contains('jdk15on')) {
                    details.useTarget group: 'org.bouncycastle',
                        name: name.replace('jdk15on', 'jdk18on'),
                        version: details.requested.version
                }
                // Force version 1.72 (compatible with Gradle 8.2 ASM)
                details.useVersion '1.72'
            }
        }
    }
}
